<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 E-Health — Lịch tổng hợp</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            font-size: 14px
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px
        }

        .header h1 {
            font-size: 1.15rem
        }

        .header a {
            color: #a8d8ea;
            font-size: .82rem;
            text-decoration: none
        }

        .auth-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap
        }

        .auth-bar input {
            padding: 5px 8px;
            border: none;
            border-radius: 5px;
            font-size: .82rem
        }

        .auth-bar button {
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: .8rem
        }

        .btn-login {
            background: #e94560;
            color: #fff
        }

        .btn-logout {
            background: #533483;
            color: #fff
        }

        .user-txt {
            color: #a8d8ea;
            font-size: .82rem
        }

        /* Controls */
        .controls {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }

        .controls input,
        .controls select {
            padding: 5px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: .83rem
        }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: .82rem;
            transition: opacity .15s
        }

        .btn:hover {
            opacity: .85
        }

        .btn-primary {
            background: #0f3460;
            color: #fff
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #d1d5db
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: .75rem
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: .78rem;
            align-items: center;
            margin-left: auto
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%
        }

        /* Month Nav */
        .month-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0
        }

        .month-nav button {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 1rem
        }

        .month-nav h2 {
            font-size: 1.05rem;
            min-width: 200px;
            text-align: center
        }

        /* Calendar Grid */
        .cal-wrap {
            padding: 12px 20px;
            max-width: 1400px;
            margin: 0 auto
        }

        .cal-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            font-size: .8rem;
            color: #64748b;
            margin-bottom: 2px
        }

        .cal-header div {
            padding: 8px 0
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px
        }

        .cal-day {
            background: #fff;
            border-radius: 8px;
            min-height: 110px;
            padding: 6px 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .15s, box-shadow .15s;
            position: relative;
        }

        .cal-day:hover {
            border-color: #93c5fd;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08)
        }

        .cal-day.selected {
            border-color: #0f3460;
            box-shadow: 0 2px 12px rgba(15, 52, 96, .15)
        }

        .cal-day.empty {
            background: #f8fafc;
            cursor: default;
            min-height: 40px
        }

        .cal-day.empty:hover {
            border-color: transparent;
            box-shadow: none
        }

        .cal-day.today {
            background: #eff6ff
        }

        /* Status colors on day */
        .cal-day.closed {
            background: #fff1f2
        }

        .cal-day.holiday {
            background: #fefce8
        }

        .day-num {
            font-weight: 700;
            font-size: .85rem;
            color: #334155;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .day-num .status-icon {
            font-size: .7rem
        }

        .day-hours {
            font-size: .68rem;
            color: #64748b;
            margin-bottom: 4px
        }

        .shift-chip {
            font-size: .68rem;
            padding: 2px 5px;
            border-radius: 4px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid;
        }

        .shift-morning {
            background: #dbeafe;
            color: #1e40af;
            border-left-color: #3b82f6
        }

        .shift-afternoon {
            background: #fef3c7;
            color: #92400e;
            border-left-color: #f59e0b
        }

        .shift-night {
            background: #f3e8ff;
            color: #6b21a8;
            border-left-color: #8b5cf6
        }

        .shift-leave {
            background: #fee2e2;
            color: #991b1b;
            border-left-color: #ef4444;
            text-decoration: line-through
        }

        .more-link {
            font-size: .65rem;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 600
        }

        /* Side Detail Panel */
        .layout {
            display: flex;
            gap: 0
        }

        .cal-area {
            flex: 1;
            overflow-y: auto
        }

        .detail-panel {
            width: 340px;
            min-width: 340px;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            overflow-y: auto;
            max-height: calc(100vh - 160px);
            position: sticky;
            top: 0;
        }

        .detail-panel.hidden {
            display: none
        }

        .dp-header {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .dp-header h3 {
            font-size: .95rem;
            color: #0f3460;
            margin: 0
        }

        .dp-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #94a3b8
        }

        .dp-section {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9
        }

        .dp-section h4 {
            font-size: .82rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px
        }

        .dp-label {
            font-size: .78rem;
            color: #94a3b8;
            font-weight: 600
        }

        .dp-value {
            font-size: .85rem;
            margin-bottom: 6px
        }

        .schedule-card {
            background: #f8fafc;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-left: 3px solid #3b82f6;
            font-size: .8rem;
        }

        .schedule-card .sc-name {
            font-weight: 700
        }

        .schedule-card .sc-time {
            color: #64748b;
            font-size: .72rem
        }

        .schedule-card .sc-room {
            color: #94a3b8;
            font-size: .72rem
        }

        .toast-container {
            position: fixed;
            top: 60px;
            right: 16px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .toast {
            padding: 9px 14px;
            border-radius: 8px;
            color: #fff;
            font-size: .82rem;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
            animation: slideIn .3s ease;
            min-width: 220px
        }

        .toast-success {
            background: #10b981
        }

        .toast-error {
            background: #ef4444
        }

        .toast-info {
            background: #3b82f6
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        /* Badge */
        .badge-open {
            background: #d1fae5;
            color: #065f46;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: .68rem;
            font-weight: 600
        }

        .badge-closed {
            background: #fee2e2;
            color: #991b1b;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: .68rem;
            font-weight: 600
        }

        @media(max-width:900px) {
            .detail-panel {
                width: 100%;
                min-width: 100%;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                max-height: 50vh;
                border-left: none;
                border-top: 2px solid #e2e8f0;
                z-index: 100
            }

            .layout {
                flex-direction: column
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <h1>📅 E-Health — Lịch tổng hợp</h1><a href="Facility Management/index.html">← Quay về Hub</a>
        </div>
        <div>
            <div class="auth-bar" id="authSection">
                <input type="text" id="loginEmail" placeholder="Email" value="admin@ehealth.com">
                <input type="password" id="loginPassword" placeholder="Mật khẩu" value="Admin@123">
                <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
            </div>
            <div class="auth-bar" id="userSection" style="display:none">
                <span class="user-txt" id="currentUser"></span>
                <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <label style="font-weight:600;font-size:.82rem">Cơ sở:</label>
        <input type="text" id="cfgFacilityId" placeholder="facility_id" value="" style="width:160px">
        <label style="font-weight:600;font-size:.82rem">Chi nhánh:</label>
        <input type="text" id="cfgBranchId" placeholder="branch_id (tuỳ chọn)" value="" style="width:160px">
        <button class="btn btn-primary" onclick="loadCalendar()">📅 Tải lịch</button>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#3b82f6"></div>Ca sáng
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#f59e0b"></div>Ca chiều
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#8b5cf6"></div>Ca tối
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#ef4444"></div>Nghỉ phép
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#fecaca"></div>Đóng cửa
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#fef08a"></div>Ngày lễ
            </div>
        </div>
    </div>

    <div class="month-nav">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthTitle">Tháng 3, 2026</h2>
        <button onclick="changeMonth(1)">▶</button>
        <button class="btn btn-outline btn-sm" onclick="goToday()" style="margin-left:8px">Hôm nay</button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="layout">
        <div class="cal-area">
            <div class="cal-wrap">
                <div class="cal-header">
                    <div>CN</div>
                    <div>T2</div>
                    <div>T3</div>
                    <div>T4</div>
                    <div>T5</div>
                    <div>T6</div>
                    <div>T7</div>
                </div>
                <div class="cal-grid" id="calGrid"></div>
            </div>
        </div>

        <div class="detail-panel hidden" id="detailPanel">
            <div class="dp-header">
                <h3 id="dpTitle">Chi tiết</h3>
                <button class="dp-close" onclick="closePanel()">✕</button>
            </div>
            <div id="dpContent"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let token = null;
        let curYear = 2026, curMonth = 3;
        let facilityStatusMap = {};
        let scheduleMap = {};
        let selectedDate = null;

        // ---- Auth ----
        function getAuth() { const d = localStorage.getItem('ehealth_auth'); return d ? JSON.parse(d) : null }
        function headers() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }
        function toast(m, t = 'info') { const c = document.getElementById('toastContainer'), e = document.createElement('div'); e.className = `toast toast-${t}`; e.textContent = m; c.appendChild(e); setTimeout(() => e.remove(), 4000) }
        window.onload = () => { const a = getAuth(); if (a?.accessToken) { token = a.accessToken; showLoggedIn(a.user) } renderGrid() }
        async function handleLogin() { try { const r = await (await fetch(`${API}/auth/login/email`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value, clientInfo: { deviceId: 'HTML_TEST', deviceName: 'Calendar', userAgent: navigator.userAgent } }) })).json(); if (!r.success) throw new Error(r.message); token = r.data.accessToken; localStorage.setItem('ehealth_auth', JSON.stringify({ accessToken: r.data.accessToken, refreshToken: r.data.refreshToken, user: r.data.user })); showLoggedIn(r.data.user); toast('Đăng nhập thành công!', 'success') } catch (e) { toast(e.message, 'error') } }
        function handleLogout() { token = null; localStorage.removeItem('ehealth_auth'); document.getElementById('authSection').style.display = 'flex'; document.getElementById('userSection').style.display = 'none'; toast('Đã đăng xuất', 'info') }
        function showLoggedIn(u) { document.getElementById('authSection').style.display = 'none'; document.getElementById('userSection').style.display = 'flex'; document.getElementById('currentUser').textContent = `👤 ${u?.name || ''} (${u?.role || ''})` }

        async function apiFetch(url) { if (!token) { toast('Vui lòng đăng nhập', 'error'); throw new Error('No token') } const r = await fetch(url, { headers: headers() }); const d = await r.json(); if (!r.ok) throw new Error(d.message || `HTTP ${r.status}`); return d }

        // ---- Month Navigation ----
        const MONTHS = ['', 'Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
        function updateTitle() { document.getElementById('monthTitle').textContent = `${MONTHS[curMonth]}, ${curYear}` }
        function changeMonth(d) { curMonth += d; if (curMonth > 12) { curMonth = 1; curYear++ } if (curMonth < 1) { curMonth = 12; curYear-- } updateTitle(); renderGrid(); autoLoad() }
        function goToday() { const t = new Date(); curYear = t.getFullYear(); curMonth = t.getMonth() + 1; updateTitle(); renderGrid(); autoLoad() }

        function autoLoad() { if (token && document.getElementById('cfgFacilityId').value) loadCalendar() }

        // ---- Date helpers ----
        function dateKey(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}` }
        function isToday(y, m, d) { const t = new Date(); return t.getFullYear() === y && t.getMonth() + 1 === m && t.getDate() === d }

        // ---- Shift helpers ----
        function shiftClass(startTime) {
            if (!startTime) return 'shift-morning';
            if (startTime >= '18:00') return 'shift-night';
            if (startTime >= '12:00') return 'shift-afternoon';
            return 'shift-morning';
        }

        // ---- Render Calendar Grid ----
        function renderGrid() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const daysInMonth = new Date(curYear, curMonth, 0).getDate();
            const startDay = new Date(curYear, curMonth - 1, 1).getDay();

            // Empty cells
            for (let i = 0; i < startDay; i++) {
                grid.innerHTML += `<div class="cal-day empty"></div>`;
            }

            // Day cells
            for (let d = 1; d <= daysInMonth; d++) {
                const dk = dateKey(curYear, curMonth, d);
                const today = isToday(curYear, curMonth, d) ? 'today' : '';
                const sel = (selectedDate === dk) ? 'selected' : '';

                // Facility status
                const fs = facilityStatusMap[dk];
                let statusClass = '';
                let hoursHtml = '';
                let statusIcon = '';
                if (fs) {
                    if (!fs.is_open) {
                        statusClass = fs.reason === 'HOLIDAY' ? 'holiday' : 'closed';
                        statusIcon = fs.reason === 'HOLIDAY' ? '🎉' : '🚫';
                        hoursHtml = `<div class="day-hours">${fs.note || 'Đóng cửa'}</div>`;
                    } else {
                        statusIcon = '';
                        const ot = fs.open_time ? fs.open_time.substring(0, 5) : '';
                        const ct = fs.close_time ? fs.close_time.substring(0, 5) : '';
                        hoursHtml = ot ? `<div class="day-hours">🕐 ${ot}–${ct}</div>` : '';
                    }
                }

                // Staff schedules preview (max 3)
                const schedules = scheduleMap[dk] || [];
                let shiftsHtml = '';
                const maxShow = 3;
                schedules.slice(0, maxShow).forEach(s => {
                    const cls = s.is_leave ? 'shift-leave' : shiftClass(s.start_time);
                    const time = s.start_time ? s.start_time.substring(0, 5) : '';
                    const name = s.full_name || s.staff_name || '';
                    shiftsHtml += `<div class="shift-chip ${cls}" title="${name} ${time}">${time} ${name}</div>`;
                });
                if (schedules.length > maxShow) {
                    shiftsHtml += `<div class="more-link">+${schedules.length - maxShow} nữa</div>`;
                }

                grid.innerHTML += `
            <div class="cal-day ${today} ${statusClass} ${sel}" onclick="selectDay('${dk}')" id="day-${dk}">
                <div class="day-num">
                    <span>${d}</span>
                    <span class="status-icon">${statusIcon}</span>
                </div>
                ${hoursHtml}
                ${shiftsHtml}
            </div>
        `;
            }
        }

        // ---- Load Data ----
        async function loadCalendar() {
            if (!token) { toast('Vui lòng đăng nhập', 'error'); return }
            const facId = document.getElementById('cfgFacilityId').value;
            const branchId = document.getElementById('cfgBranchId').value;

            facilityStatusMap = {};
            scheduleMap = {};

            // Load facility status calendar
            if (facId) {
                try {
                    const r = await apiFetch(`${API}/facility-status/calendar?facility_id=${facId}&month=${curMonth}&year=${curYear}`);
                    if (r.data?.days) {
                        r.data.days.forEach(day => {
                            const dk = day.date?.substring(0, 10);
                            if (dk) facilityStatusMap[dk] = day;
                        });
                    }
                } catch (e) { toast('Facility status: ' + e.message, 'error') }
            }

            // Load staff schedules calendar
            try {
                const params = new URLSearchParams({ month: curMonth, year: curYear });
                if (branchId) params.set('branch_id', branchId);
                const r = await apiFetch(`${API}/staff-schedules/calendar?${params}`);
                if (r.data) {
                    // Data is grouped by date
                    for (const [dateStr, shifts] of Object.entries(r.data)) {
                        let dk = dateStr;
                        if (dateStr.includes('T')) {
                            const d = new Date(dateStr);
                            dk = dateKey(d.getFullYear(), d.getMonth() + 1, d.getDate());
                        }
                        scheduleMap[dk] = shifts;
                    }
                }
            } catch (e) { toast('Schedules: ' + e.message, 'error') }

            renderGrid();
            toast('Đã tải lịch tháng ' + curMonth + '/' + curYear, 'success');
        }

        // ---- Day Selection & Detail Panel ----
        function selectDay(dk) {
            selectedDate = dk;
            renderGrid();
            showDayDetail(dk);
        }

        function closePanel() {
            selectedDate = null;
            document.getElementById('detailPanel').classList.add('hidden');
            renderGrid();
        }

        async function showDayDetail(dk) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('dpContent');
            panel.classList.remove('hidden');

            const d = new Date(dk + 'T00:00:00');
            const dayNames = ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            document.getElementById('dpTitle').textContent = `${dayNames[d.getDay()]}, ${dk}`;

            let html = '';

            // 1. Facility Status
            const fs = facilityStatusMap[dk];
            if (fs) {
                html += `<div class="dp-section">
            <h4>🏢 Trạng thái Cơ sở</h4>
            <div>${fs.is_open ? `<span class="badge-open">✅ Mở cửa</span>` : `<span class="badge-closed">🚫 Đóng cửa</span>`}</div>
            ${fs.open_time ? `<div class="dp-value" style="margin-top:4px">🕐 ${fs.open_time.substring(0, 5)} – ${fs.close_time.substring(0, 5)}</div>` : ''}
            ${fs.reason ? `<div class="dp-label">Lý do: ${fs.reason}</div>` : ''}
            ${fs.note ? `<div class="dp-label">📝 ${fs.note}</div>` : ''}
        </div>`;
            }

            // 2. Staff Schedules (from already loaded data)
            const cached = scheduleMap[dk] || [];
            html += `<div class="dp-section">
        <h4>👨‍⚕️ Lịch làm việc (${cached.length} người)</h4>
        <div id="dpSchedules">`;

            if (cached.length === 0) {
                html += `<div style="color:#94a3b8;font-size:.82rem;padding:8px 0">Không có lịch làm việc</div>`;
            }

            cached.forEach(s => {
                const cls = s.is_leave ? 'border-left-color:#ef4444' :
                    (s.start_time >= '18:00' ? 'border-left-color:#8b5cf6' :
                        s.start_time >= '12:00' ? 'border-left-color:#f59e0b' : 'border-left-color:#3b82f6');
                const leaveTag = s.is_leave ? `<span style="color:#ef4444;font-size:.7rem"> 🚫 Nghỉ phép</span>` : '';
                html += `<div class="schedule-card" style="${cls}">
            <div class="sc-name">${s.full_name || s.staff_name || '?'}${leaveTag}</div>
            <div class="sc-time">${s.start_time ? s.start_time.substring(0, 5) : ''} – ${s.end_time ? s.end_time.substring(0, 5) : ''} | ${s.shift_name || ''}</div>
            <div class="sc-room">📍 ${s.room_name || 'Chưa gán phòng'} ${s.branch_name ? '| ' + s.branch_name : ''}</div>
        </div>`;
            });

            html += `</div></div>`;

            // 3. Quick actions
            html += `<div class="dp-section">
        <h4>⚡ Thao tác nhanh</h4>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="loadDayScheduleFromAPI('${dk}')">🔄 Tải chi tiết từ API</button>
        </div>
    </div>`;

            content.innerHTML = html;
        }

        // Load detailed schedule via /api/staff-schedules/date/{date}
        async function loadDayScheduleFromAPI(dk) {
            try {
                const branchId = document.getElementById('cfgBranchId').value;
                const params = branchId ? `?branch_id=${branchId}` : '';
                const r = await apiFetch(`${API}/staff-schedules/date/${dk}${params}`);

                if (r.data) {
                    // Update cache
                    const items = Array.isArray(r.data) ? r.data : (r.data.schedules || []);
                    scheduleMap[dk] = items;
                    renderGrid();
                    showDayDetail(dk);
                    toast('Đã tải chi tiết ngày ' + dk, 'success');
                }
            } catch (e) { toast(e.message, 'error') }
        }

        // ---- Init ----
        updateTitle();
    </script>

</body>

</html>
